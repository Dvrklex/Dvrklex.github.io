name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 🚨 se ejecuta cada vez que pusheás a 'main'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v3
        with: 
          fetch-depth: 0

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔨 Build project
        run: npm run build

      - name: 🗺️ Generate Sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://dvrklex.github.io/
          path-to-root: dist 
          drop-html-extension: true
          
      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
